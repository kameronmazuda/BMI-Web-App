<h1>BMI Formular</h1>

<form id="bmiForm">
  <input type="number" id="age" placeholder="Age (Years)" required min="1" max="120">
  <input type="date" id="date" required>
  <input type="number" id="weight" placeholder="Weight in Kg" required min="1" max="500">
  <input type="number" id="height" placeholder="Height in cm" required min="50" max="250">

  <button type="button" onclick="calculateBMI()">BMI berechnen</button>
  <button type="button" onclick="clearData()" style="margin-top:10px;background-color:#f44336;">
    Clear / Reset
  </button>
</form>

<div id="result" style="display:none;">
  <h2>Ihr BMI Ergebnis</h2>
  <p id="bmiValue"></p>
  <p id="bmiCategory"></p>
</div>

<!-- Toast container -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="errorToast" class="toast text-bg-danger border-0" role="alert">
    <div class="d-flex">
      <div id="errorToastBody" class="toast-body"></div>

      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast">
      </button>
    </div>
  </div>
</div>

<script src="./formular.js"></script>
